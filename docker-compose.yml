# Self-contained Docker distribution — unzip and run docker compose up --build
services:

  redis:
    image: redis:7-alpine
    container_name: quesarc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        INSTALL_FULL_REQUIREMENTS: "1"
    container_name: quesarc_app
    # avoid port clash with chroma service; expose on 8001 host port instead
    ports:
      - "8001:8001"
    networks:
      default:
        aliases:
          - backend
    volumes:
      - .:/app
      # ChromaDB persistent volume locked in — data survives container restarts
      - chroma_data:/app/chroma
    depends_on:
      chroma:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEMORY_COMPRESS_THRESHOLD=999999
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # ChromaDB persistence directory — mapped to the chroma_data named volume
      - CHROMA_PATH=/app/chroma
      - PORT=8001
      - BACKEND_URL=http://backend:8001
      # Backend listens on 8001 in the container to avoid localhost:8000 conflicts
      # forward AI service keys from host .env or environment
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ALLOW_ORIGINS=*
    restart: unless-stopped

  quesarc_worker:
    build:
      context: .
      args:
        INSTALL_FULL_REQUIREMENTS: "1"
    container_name: quesarc_worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    depends_on:
      - redis
      - app
    environment:
      # Environment must match the `app` service for agents to work
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: quesarc_flower
    command: ["celery", "flower", "--broker=redis://redis:6379/0", "--port=5555"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_BROKER_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    restart: unless-stopped
    # Flower depends on healthy broker to avoid ConnectionRefusedError

  chroma:
    image: chromadb/chroma:latest
    container_name: quesarc_chroma
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_ALLOW_ORIGIN=*
    # A more robust healthcheck that hits the ChromaDB heartbeat API endpoint.
    # The official ChromaDB image does not include curl or wget, so a Python HTTP client is used.
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client, sys; try: conn = http.client.HTTPConnection('localhost', 8000, timeout=1); conn.request('GET', '/api/v1/heartbeat'); response = conn.getresponse(); sys.exit(0) if response.status == 200 else sys.exit(1); finally: conn.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    # containerized development server for React frontend. we mount the
    # project directory but keep a separate volume for `node_modules` so that
    # Linux-native packages are installed inside the container rather than
    # reusing whatever the host built (Windows packages would cause
    # "MODULE_NOT_FOUND" errors).
    image: node:18-alpine
    container_name: quesarc_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    environment:
      - IN_DOCKER=true
      - VITE_BACKEND_URL=http://backend:8001
      - BACKEND_URL=http://backend:8001
    # Always run `npm ci` first to ensure dependencies in the container's
    # node_modules volume are correct. Then, launch the Vite dev server.
    # We pass `--host` to ensure Vite listens on all network interfaces
    # (0.0.0.0), making it accessible from the host machine via the
    # published port. This enables hot-reloading for development.
    command: ["sh","-c","npm ci && npm run dev -- --host"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: concierge_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  redis_data:
  frontend_node_modules:
  # Named volume for ChromaDB persistence — prevents "[Errno 30] Read-only
  # file system" errors that occur when writing to the image layer.
  chroma_data:

networks:
  default:
    name: quesarc_network