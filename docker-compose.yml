services:

  redis:
    image: redis:7-alpine
    container_name: quesarc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: quesarc_app
    # avoid port clash with chroma service; expose on 8001 host port instead
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      - chroma
      - qdrant
      - redis
    environment:
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEMORY_COMPRESS_THRESHOLD=999999
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1

  quesarc_worker:
    build: .
    container_name: quesarc_worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    depends_on:
      - redis
      - app
    environment:
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1

  flower:
    image: mher/flower:2.0
    container_name: quesarc_flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    depends_on:
      - redis
    ports:
      - "5555:5555"

  chroma:
    image: chromadb/chroma:latest
    container_name: quesarc_chroma
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_ALLOW_ORIGIN=*
    # healthcheck removed: the official image does not include curl, so the
    # default check always fails and prevents dependent services from starting.
    # If you need a healthcheck, add an appropriate command or build a custom
    # image with curl/wget available.

  frontend:
    # containerized development server for React frontend. we mount the
    # project directory but keep a separate volume for `node_modules` so that
    # Linux-native packages are installed inside the container rather than
    # reusing whatever the host built (Windows packages would cause
    # "MODULE_NOT_FOUND" errors).
    image: node:18-alpine
    container_name: quesarc_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    environment:
      - IN_DOCKER=true
    # always run `npm ci` first to populate the container's node_modules, then
    # launch the dev server. `npm ci` is fast when the lockfile hasn't changed.
    # `--host` is redundant when `vite.config.ts` already sets `host: true`,
    # but we include it here as a belt‑and‑suspenders measure so that the
    # container's output explicitly tells us the server will accept external
    # connections.
    command: ["sh","-c","npm ci && npm run dev -- --host"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: concierge_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  redis_data:
  frontend_node_modules:

networks:
  default:
    name: quesarc_network