services:

  app:
    build: .
    container_name: quesarc_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - chroma
      - qdrant
    environment:
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MEMORY_COMPRESS_THRESHOLD=100

  chroma:
    image: chromadb/chroma:latest
    container_name: quesarc_chroma
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_ALLOW_ORIGIN=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: concierge_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:

networks:
  default:
    name: quesarc_network