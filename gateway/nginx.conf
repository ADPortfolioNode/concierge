user  nginx;
worker_processes  auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Use Docker embedded DNS (127.0.0.11) and enable runtime resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    upstream app_up {
        zone app_up 64k;
        server app:8000 resolve;
    }

    # In dev mode the frontend dev server may be proxied; resolve at runtime
    upstream frontend_up {
        zone frontend_up 64k;
        server frontend:5173 resolve;
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        location /api/ {
            proxy_pass         http://app_up;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Proxy frontend dev server during development if requested
        location /__vite/ {
            proxy_pass         http://frontend_up;
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
