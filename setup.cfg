[flake8]
max-line-length = 120
# Exclude directories that are not part of the application source code
exclude =
    .git,
    .venv,
    venv,
    __pycache__,
    .vercel_tmp_env,
    build_packages,
    uv,
    node_modules,
    frontend/node_modules,
    dist,
    build,
    *.egg-info
# Ignore purely cosmetic whitespace/style rules that do not indicate bugs.
# E1xx/E2xx/E3xx/W2xx/W3xx: whitespace and blank-line style
# E4xx: imports ordering (covered by isort separately)
# E501: line-too-long (covered by max-line-length above)
# E731: lambda assignment (common and intentional pattern here)
# W503/W504: line break before/after binary operator (conflicting rules)
# F401: unused imports (common in dynamic/plugin-heavy architectures)
# F841: local variable assigned but unused (common in try/except scaffolding)
# F811: redefinition of unused name (common in conditional import patterns)
per-file-ignores =
    # smoke/diagnostic scripts: tolerate compact, one-off style
    scripts/*.py: E225,E231,E241,E401,E711,E712,F401,F841
    # test files: allow broad imports and common test patterns
    tests/*.py: F401,E501,F841
    # tools and workers: tolerate conditional/deferred imports
    tools/*.py: F401,F811,F841
    # workstation modules: tolerate optional-dependency imports
    workstation/*.py: F401,F841
ignore =
    E127,E128,E202,E225,E226,E231,E241,E261,E262,E265,E266,E301,E302,E303,E305,
    E306,E401,E402,E501,E702,E711,E712,E731,E741,W191,W291,W292,W293,W391,W503,
    W504,W605,F401,F403,F405,F811,F841
